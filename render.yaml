services:
  - type: web
    name: leaching-mass-balance
    env: python
    rootDir: balance-masas-app
    buildCommand: python3 -m pip install -r requirements.txt
    startCommand: python3 -m gunicorn backend.api.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
